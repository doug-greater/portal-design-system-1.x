<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../fonts/fonts.css"><style>
body{margin:0;padding:20px;background:#fff}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font:500 12px/1 Inter;letter-spacing:.04em}
.lbl{font:500 12px/1.2 Inter;color:var(--p-ink);margin:0 0 10px}
</style></head><body>
<div class="lbl">Category pills — used inline in tables</div>
<div class="row">
<!-- Original 5 -->
<span class="pill" style="background:var(--p-pill-beer-bg);color:var(--p-pill-beer-fg)">Beer</span>
<span class="pill" style="background:var(--p-pill-wine-bg);color:var(--p-pill-wine-fg)">Wine</span>
<span class="pill" style="background:var(--p-pill-spirits-bg);color:var(--p-pill-spirits-fg)">Spirits</span>
<span class="pill" style="background:var(--p-pill-rtd-bg);color:var(--p-pill-rtd-fg)">RTD</span>
<span class="pill" style="background:var(--p-pill-nonalc-bg);color:var(--p-pill-nonalc-fg)">Non-Alcoholic</span>
<!-- New 5 — derived from design system accent palette -->
<span class="pill" style="background:var(--g-red-10);color:#B91C1C">Cider</span>
<span class="pill" style="background:var(--g-gold-10);color:#92400E">Mead</span>
<span class="pill" style="background:rgba(20,184,166,.12);color:#0D9488">Sake</span>
<span class="pill" style="background:rgba(85,167,255,.12);color:#0369A1">Seltzer</span>
<span class="pill" style="background:var(--g-black-05);color:var(--g-dark-gray)">Other</span>
</div>
</body></html>
