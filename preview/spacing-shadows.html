<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../fonts/fonts.css"><style>
body{margin:0;padding:20px;background:var(--p-shell);display:flex;gap:16px;flex-wrap:wrap}
.box{padding:24px 40px;background:#fff}
.shadow-tooltip{box-shadow:var(--shadow-tooltip);border-radius:6px}
.shadow-card{box-shadow:var(--shadow-card);border-radius:6px}
.shadow-surface{box-shadow:var(--shadow-surface);border:1px solid var(--p-border);border-radius:8px}
.shadow-float{box-shadow:var(--shadow-float);border-radius:10px}
.shadow-brutal{box-shadow:var(--shadow-brutal);border:1px solid var(--p-ink);border-radius:4px}
.lbl{font:500 11px/1.2 'Geist Mono',monospace;color:var(--p-muted);margin-top:6px;text-align:center}
.wrap{display:flex;flex-direction:column;align-items:center}
</style></head><body>
<div class="wrap"><div class="box shadow-tooltip">Tooltip</div><div class="lbl">--shadow-tooltip</div></div>
<div class="wrap"><div class="box shadow-card">Card</div><div class="lbl">--shadow-card (small)</div></div>
<div class="wrap"><div class="box shadow-surface">Surface</div><div class="lbl">--shadow-surface (large, on shell)</div></div>
<div class="wrap"><div class="box shadow-float">Floating popover</div><div class="lbl">--shadow-float</div></div>
<div class="wrap"><div class="box shadow-brutal">Brand</div><div class="lbl">--shadow-brutal</div></div>
</body></html>
