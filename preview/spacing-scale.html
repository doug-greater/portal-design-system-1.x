<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../fonts/fonts.css"><style>
body{margin:0;padding:20px;background:var(--p-shell);display:flex;flex-direction:column;gap:14px}
.row{display:flex;align-items:center;gap:14px}
.bar{height:10px;background:var(--p-primary);border-radius:2px}
.lbl{font:400 11px/1.2 'Geist Mono',monospace;color:var(--p-muted);width:54px;flex-shrink:0}
.nm{font:500 13px/1.2 Inter;color:var(--p-ink);width:110px}
</style></head><body>
<div class="row"><span class="lbl">2px</span><span class="nm">space-0.5</span><span class="bar" style="width:2px"></span></div>
<div class="row"><span class="lbl">4px</span><span class="nm">space-1</span><span class="bar" style="width:4px"></span></div>
<div class="row"><span class="lbl">8px</span><span class="nm">space-2</span><span class="bar" style="width:8px"></span></div>
<div class="row"><span class="lbl">12px</span><span class="nm">space-3</span><span class="bar" style="width:12px"></span></div>
<div class="row"><span class="lbl">16px</span><span class="nm">space-4</span><span class="bar" style="width:16px"></span></div>
<div class="row"><span class="lbl">24px</span><span class="nm">space-6</span><span class="bar" style="width:24px"></span></div>
<div class="row"><span class="lbl">32px</span><span class="nm">space-8</span><span class="bar" style="width:32px"></span></div>
<div class="row"><span class="lbl">48px</span><span class="nm">space-12</span><span class="bar" style="width:48px"></span></div>
<div class="row"><span class="lbl">64px</span><span class="nm">space-16</span><span class="bar" style="width:64px"></span></div>
</body></html>
