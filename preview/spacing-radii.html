<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../fonts/fonts.css"><style>
body{margin:0;padding:20px;background:#fff;display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end}
.box{width:80px;height:80px;background:#EFF6FF;border:1px solid var(--p-primary);display:flex;align-items:center;justify-content:center;font:500 11px 'Geist Mono',monospace;color:var(--p-primary)}
.lbl{font:500 11px 'Geist Mono',monospace;color:var(--p-ink);margin-top:8px;text-align:center;letter-spacing:.02em}
.use{font:400 11px/1.3 Inter;color:var(--p-text-2);margin-top:2px;text-align:center;max-width:100px}
.w{display:flex;flex-direction:column;align-items:center}
</style></head><body>
<div class="w">
  <div class="box" style="border-radius:2px">2</div>
  <div class="lbl">2px · default</div>
  <div class="use">Inputs, cards, buttons — most UI</div>
</div>
<div class="w">
  <div class="box" style="border-radius:4px">4</div>
  <div class="lbl">4px · rare</div>
  <div class="use">Occasional soft containers</div>
</div>
<div class="w">
  <div class="box" style="border-radius:8px">8</div>
  <div class="lbl">8px · panels</div>
  <div class="use">Info banners, larger surface cards</div>
</div>
<div class="w">
  <div class="box" style="border-radius:999px">∞</div>
  <div class="lbl">pill</div>
  <div class="use">Tags, status pills, toggle track</div>
</div>
</body></html>
