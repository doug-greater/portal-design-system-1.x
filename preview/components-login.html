<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../fonts/fonts.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@20..48,400,0..1,0">
<style>
body { margin: 0; min-height: 100vh; background: var(--p-shell); font: 400 14px Inter; color: var(--p-ink); display: flex; align-items: center; justify-content: center; }
.mi { font-family: 'Material Symbols Sharp'; line-height: 1; display: inline-flex; align-items: center; vertical-align: middle; }
.card { width: 380px; max-width: 92vw; display: flex; flex-direction: column; gap: 16px; }
.crow { height: 40px; margin: 0 auto 4px; display: block }
.title { margin: 0; font: 600 22px/1.3 Inter; letter-spacing: -.01em; text-align: center; color: var(--p-ink) }
.flabel { font: 500 11px Inter; letter-spacing: .04em; text-transform: uppercase; color: var(--p-muted); margin-bottom: 6px; display: block }
.fld input { width: 100%; height: 56px; box-sizing: border-box; padding: 0 16px; border: 1px solid var(--p-border-strong); border-radius: 4px; font: 400 16px Inter; color: var(--p-ink); background: var(--p-surface); outline: none }
.fld input:focus { border-color: var(--p-primary); box-shadow: 0 0 0 3px rgba(0,124,255,.15) }
.err { display: flex; align-items: center; gap: 8px; background: var(--g-red-10); color: var(--p-danger-strong); border-radius: 6px; padding: 9px 12px; font: 500 13px Inter }
.signin { width: 100%; height: 48px; border: none; border-radius: 4px; background: var(--p-action); color: var(--p-action-fg); font: 600 15px/1 Inter; cursor: pointer }
.legal { font: 400 12px/1.5 Inter; color: var(--p-placeholder); text-align: center }
.legal a { color: var(--p-primary); text-decoration: none }
.devbox { margin-top: 6px; border-top: 1px dashed var(--p-border-strong); padding-top: 14px; display: flex; flex-direction: column; gap: 8px }
.devlabel { font: 500 11px Inter; letter-spacing: .04em; text-transform: uppercase; color: var(--p-placeholder); text-align: center }
.devbtn { display: inline-flex; align-items: center; gap: 8px; justify-content: center; height: 38px; border: 1px dashed var(--p-border-strong); border-radius: 4px; background: var(--p-surface); color: var(--p-text-2); font: 500 13px/1 Inter; cursor: pointer }
.themetoggle { position: fixed; bottom: 16px; left: 16px; display: inline-flex; align-items: center; gap: 6px; font: 500 12px Inter; color: var(--p-muted); cursor: pointer }
</style></head>
<body>
<div class="card">
  <img class="crow" src="../assets/greater-crow.png" alt="Greater">
  <h1 class="title">Sign in to your account</h1>

  <div class="err"><span class="mi" style="font-size:16px">error</span>Incorrect email or password.</div>

  <div class="fld">
    <label class="flabel" for="le">Email</label>
    <input id="le" type="email" autocomplete="email" value="antonio@coastalbev.com" data-testid="login-email">
  </div>
  <div class="fld">
    <label class="flabel" for="lp">Password</label>
    <input id="lp" type="password" autocomplete="current-password" value="········" data-testid="login-password">
  </div>

  <button class="signin" data-testid="login-signin-btn">Sign In</button>

  <p class="legal">By signing in you agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>

  <div class="devbox">
    <div class="devlabel">Dev quick sign-in</div>
    <button class="devbtn" data-testid="dev-login-exec"><span class="mi" style="font-size:16px">bolt</span> Sign in as Executive (exec@greater.co)</button>
    <button class="devbtn" data-testid="dev-login-rep"><span class="mi" style="font-size:16px">bolt</span> Sign in as Sales Rep (rep@greater.co)</button>
  </div>
</div>

<div class="themetoggle" data-testid="login-theme-toggle"><span class="mi" style="font-size:18px">contrast</span> System</div>
</body></html>
