<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../fonts/fonts.css"><style>
body{margin:0;padding:20px;background:#fff}
.row{display:flex;gap:12px;flex-wrap:wrap}
.sw{width:110px}
.chip{height:68px;border-radius:6px}
.lbl{font:500 12px/1.2 Inter;color:var(--p-ink);margin-top:8px}
.sub{font:400 11px/1.2 Inter;color:var(--p-muted)}
.hex{font:400 11px/1.2 'Geist Mono',monospace;color:var(--p-muted);margin-top:2px}
</style></head><body>
<div class="row">
<div class="sw"><div class="chip" style="background:#007CFF"></div><div class="lbl">Primary blue</div><div class="hex">#007CFF</div></div>
<div class="sw"><div class="chip" style="background:#00BC57"></div><div class="lbl">Secondary green</div><div class="hex">#00BC57</div></div>
<div class="sw"><div class="chip" style="background:#E5484D"></div><div class="lbl">Secondary red</div><div class="hex">#E5484D</div></div>
<div class="sw"><div class="chip" style="background:#DB9E03"></div><div class="lbl">Tertiary gold</div><div class="hex">#DB9E03</div></div>
<div class="sw"><div class="chip" style="background:#7B68EE"></div><div class="lbl">Tertiary purple</div><div class="hex">#7B68EE</div></div>
<div class="sw"><div class="chip" style="background:#55A7FF"></div><div class="lbl">Seldom sky</div><div class="hex">#55A7FF</div></div>
</div>
</body></html>
