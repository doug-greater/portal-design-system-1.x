<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../fonts/fonts.css"><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@20..48,400,0,0"><style>
body{margin:0;padding:20px;background:var(--p-shell);display:flex;gap:30px;align-items:center;flex-wrap:wrap}
.g{display:flex;flex-direction:column;gap:10px}
.lbl{font:500 11px/1.2 'Geist Mono',monospace;color:var(--p-muted)}

/* Foundation toggle — pill track with knob riding on top */
.tg{width:36px;height:20px;position:relative;cursor:pointer;display:inline-block}
.tg .track{position:absolute;inset:0;border-radius:999px;background:#D1D5DB;transition:background .15s}
.tg .knob{position:absolute;top:1px;left:1px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:left .15s}
.tg.on .track{background:#007CFF}
.tg.on .knob{left:17px}
.tg.dis .track{background:#E5E7EB}
.tg.dis .knob{background:#F3F4F6}

/* Checkbox */
.cb{width:18px;height:18px;border:1.5px solid var(--p-border-strong);border-radius:3px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;background:#fff}
.cb.on{background:#007CFF;border-color:#007CFF}
.cb.on span{color:#fff}
.cb.dis{background:var(--p-surface-tint);border-color:var(--p-border-strong);cursor:not-allowed}
.cb.dis span{color:var(--p-placeholder)}

/* Radio */
.rd{width:18px;height:18px;border:1.5px solid var(--p-border-strong);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;background:#fff}
.rd.on{border-color:#007CFF}
.rd.on::after{content:"";width:8px;height:8px;border-radius:50%;background:#007CFF}

.row{display:flex;gap:10px;align-items:center;font:400 14px Inter;color:var(--p-ink)}
</style></head><body>
<div class="g">
  <span class="lbl">TOGGLE</span>
  <div class="row"><span class="tg on"><span class="track"></span><span class="knob"></span></span>On</div>
  <div class="row"><span class="tg"><span class="track"></span><span class="knob"></span></span>Off</div>
</div>
<div class="g">
  <span class="lbl">CHECKBOX</span>
  <div class="row"><span class="cb on"><span style="font-family:'Material Symbols Sharp';font-size:14px;line-height:1">check</span></span>Checked</div>
  <div class="row"><span class="cb"></span>Unchecked</div>
  <div class="row"><span class="cb dis on"><span style="font-family:'Material Symbols Sharp';font-size:14px;line-height:1">check</span></span>Disabled (1.5)</div>
</div>
<div class="g">
  <span class="lbl">RADIO</span>
  <div class="row"><span class="rd on"></span>Selected</div>
  <div class="row"><span class="rd"></span>Unselected</div>
</div>
</body></html>
